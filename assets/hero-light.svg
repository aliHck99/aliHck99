<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Ali Naim — Cybersecurity Student — Open to roles">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f8fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0969da"/>
      <stop offset="0.5" stop-color="#8250df"/>
      <stop offset="1" stop-color="#1a7f37"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d0d7de" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <rect x="0" y="0" width="6" height="360" fill="url(#accent)"/>

  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
    <text x="60" y="120" font-size="22" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#57606a">$ whoami</text>
    <text x="60" y="190" font-size="76" font-weight="700" fill="#1f2328" letter-spacing="-2">Ali Naim</text>
    <text x="60" y="240" font-size="28" font-weight="500" fill="#424a53">Cybersecurity student &#8226; SOC analysis &amp; penetration testing</text>
    <text x="60" y="290" font-size="18" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#0969da">eJPT &#8226; ICCA &#8226; USAL '27 &#8226; Lebanon</text>
  </g>

  <g transform="translate(950, 285)">
    <rect x="0" y="0" rx="20" ry="20" width="240" height="44" fill="#ffffff" stroke="#1a7f37" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="6" fill="#1a7f37">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;7.5;6" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="22" cy="22" r="6" fill="none" stroke="#1a7f37" stroke-width="1.8" opacity="0.65">
      <animate attributeName="r" values="6;18" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.65;0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="29" font-size="17" font-weight="700" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif" fill="#1a7f37">Open to roles</text>
  </g>

  <g transform="translate(1080, 150)" opacity="0.95">
    <circle cx="0" cy="0" r="78" fill="none" stroke="#0969da" stroke-width="1" opacity="0.25"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#8250df" stroke-width="1" opacity="0.25"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#1a7f37" stroke-width="1" opacity="0.25"/>
    <path d="M -78 0 L 78 0 M 0 -78 L 0 78" stroke="#d0d7de" stroke-width="0.7"/>

    <circle cx="0" cy="0" r="6" fill="none" stroke="#0969da" stroke-width="2">
      <animate attributeName="r" values="6;82" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#8250df" stroke-width="2">
      <animate attributeName="r" values="6;82" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;0.5" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#1a7f37" stroke-width="2">
      <animate attributeName="r" values="6;82" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;0.5" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="0" cy="0" r="6" fill="#1a7f37">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="14" fill="#1a7f37" opacity="0.18">
      <animate attributeName="opacity" values="0.18;0.04;0.18" dur="2s" repeatCount="indefinite"/>
    </circle>

    <g stroke="#0969da" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7">
      <line x1="0" y1="0" x2="78" y2="0">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="6s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>
</svg>
