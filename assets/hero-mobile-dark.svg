<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 540" width="768" height="540" role="img" aria-label="Ali Naim — Cybersecurity Student — Available now">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#a371f7"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#21262d" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="768" height="540" fill="url(#bg)"/>
  <rect width="768" height="540" fill="url(#grid)"/>
  <rect x="0" y="0" width="768" height="6" fill="url(#accent)"/>

  <g transform="translate(294, 30)">
    <rect x="0" y="0" rx="14" ry="14" width="180" height="28" fill="#0d1117" stroke="#238636" stroke-width="1.2"/>
    <circle cx="18" cy="14" r="5" fill="#3fb950">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;6;5" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="14" r="5" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="5;14" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="34" y="19" font-size="14" font-weight="600" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif" fill="#3fb950">Available now</text>
  </g>

  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif" text-anchor="middle">
    <text x="384" y="110" font-size="22" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#7d8590">$ whoami</text>
    <text x="384" y="190" font-size="72" font-weight="700" fill="#f0f6fc" letter-spacing="-2">Ali Naim</text>
    <text x="384" y="250" font-size="24" font-weight="500" fill="#c9d1d9">Cybersecurity student</text>
    <text x="384" y="285" font-size="24" font-weight="500" fill="#c9d1d9">SOC &amp; penetration testing</text>
    <text x="384" y="510" font-size="18" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#58a6ff">eJPT &#8226; ICCA &#8226; USAL '27 &#8226; Lebanon</text>
  </g>

  <g transform="translate(384, 400)" opacity="0.95">
    <circle cx="0" cy="0" r="62" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.25"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#a371f7" stroke-width="1" opacity="0.25"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.25"/>
    <path d="M -62 0 L 62 0 M 0 -62 L 0 62" stroke="#30363d" stroke-width="0.7"/>

    <circle cx="0" cy="0" r="6" fill="none" stroke="#58a6ff" stroke-width="2">
      <animate attributeName="r" values="6;66" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#a371f7" stroke-width="2">
      <animate attributeName="r" values="6;66" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;0.5" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#7ee787" stroke-width="2">
      <animate attributeName="r" values="6;66" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;0.5" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="0" cy="0" r="6" fill="#7ee787">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
