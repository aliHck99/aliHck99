<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" width="600" height="680" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Ali Naim — Cybersecurity Student">
  <defs>
    <linearGradient id="accentMD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#7ee787"/>
    </linearGradient>
    <linearGradient id="nameMD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#7ee787"/>
    </linearGradient>
    <radialGradient id="bgGlowMD" cx="50%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="#1A2238" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreenMD" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7ee787" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace; }
    @keyframes breathe   { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes blink     { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes float-a   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes float-b   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
    @keyframes pulse-rule { 0%,100% { transform: scaleX(1); opacity: 0.9; } 50% { transform: scaleX(1.08); opacity: 1; } }
    @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .live   { animation: breathe 2.2s ease-in-out infinite; }
    .blink  { animation: blink 1.1s steps(2) infinite; }
    .float-a { animation: float-a 5s ease-in-out infinite; transform-origin: center; }
    .float-b { animation: float-b 6s ease-in-out infinite; transform-origin: center; }
    .pulse-rule { animation: pulse-rule 3s ease-in-out infinite; transform-origin: left center; }
    .rotate-slow { animation: rotate-slow 60s linear infinite; transform-origin: 480px 180px; }
  </style>

  <rect width="600" height="680" fill="#0D1117"/>
  <rect width="600" height="680" fill="url(#bgGlowMD)"/>
  <circle cx="100" cy="600" r="260" fill="url(#glowGreenMD)"/>

  <circle class="float-a" cx="510" cy="500" r="6"  fill="#58a6ff" opacity="0.55"/>
  <circle class="float-b" cx="60"  cy="320" r="4"  fill="#7ee787" opacity="0.60"/>
  <circle class="float-a" cx="540" cy="630" r="5"  fill="#7ee787" opacity="0.35"/>
  <rect   class="float-b" x="40" y="540" width="9" height="9" fill="#a371f7" opacity="0.50" transform="rotate(45 44 544)"/>

  <g transform="translate(40, 50)">
    <rect width="220" height="40" rx="20" fill="#238636"/>
    <circle cx="22" cy="20" r="6" fill="#0D1117" class="live"/>
    <text class="sans" x="40" y="26" font-size="14" font-weight="800" fill="#0D1117" letter-spacing="1.4">AVAILABLE NOW</text>
  </g>

  <text class="mono" x="40" y="128" font-size="12" font-weight="600" fill="#94A3B8" letter-spacing="1.5">LEBANON  ·  USAL  ·  3 LANGUAGES</text>

  <g>
    <g class="rotate-slow">
      <circle cx="480" cy="180" r="80" fill="none" stroke="#F5F1E8" stroke-width="1" stroke-dasharray="3 7" opacity="0.22"/>
      <circle cx="480" cy="100" r="3" fill="#7ee787"/>
    </g>
    <circle cx="480" cy="180" r="56" fill="#F5F1E8"/>
    <circle cx="480" cy="180" r="56" fill="none" stroke="#58a6ff" stroke-width="3"/>
    <text class="sans" x="480" y="202" font-size="56" font-weight="800" fill="#0D1117" text-anchor="middle" letter-spacing="-2">A</text>
  </g>

  <text class="sans" x="40" y="338" font-size="86" font-weight="800" fill="url(#nameMD)" letter-spacing="-3">Ali</text>
  <g>
    <text class="sans" x="40" y="424" font-size="86" font-weight="800" fill="url(#nameMD)" letter-spacing="-3">Naim.</text>
    <rect x="278" y="356" width="14" height="64" fill="#58a6ff" class="blink"/>
  </g>

  <rect x="40" y="448" width="150" height="6" rx="3" fill="url(#accentMD)" class="pulse-rule"/>

  <text class="sans" x="40" y="500" font-size="22" font-weight="700" fill="#F5F1E8">SOC Analysis  ·  Penetration Testing.</text>

  <line x1="40" y1="600" x2="560" y2="600" stroke="#F5F1E8" stroke-width="1.2"/>
  <text class="mono" x="300" y="638" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="2" text-anchor="middle">3 SECURITY LABS  ·  eJPT + ICCA  ·  13 CTF WRITEUPS</text>
</svg>
